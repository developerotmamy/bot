<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBANK Pro Валидатор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --mbank-green: #24c851;
            --mbank-dark-green: #1ca340;
            --error-red: #ff3b30;
            --gray-bg: #f5f5f7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, var(--gray-bg));
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 16px;
            display: flex; justify-content: center;
        }
        .app-container {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            padding: 24px; border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            width: 100%; max-width: 360px; box-sizing: border-box;
        }
        .header { text-align: center; margin-bottom: 24px; }
        .header h2 { margin: 0 0 8px 0; font-size: 22px; color: var(--mbank-green); }
        .header p { margin: 0; font-size: 13px; color: var(--tg-theme-hint-color, #8e8e93); }
        .input-group { margin-bottom: 18px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--tg-theme-hint-color, #8e8e93); }
        input {
            width: 100%; padding: 14px;
            border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 12px;
            font-size: 16px; font-weight: 500;
            background: var(--tg-theme-bg-color, #fafafa);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box; outline: none; transition: all 0.2s ease;
        }
        input.valid { border-color: var(--mbank-green); box-shadow: 0 0 0 3px rgba(36, 200, 81, 0.15); }
        input.invalid { border-color: var(--error-red); box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.15); }
        .card-row { display: flex; gap: 16px; }
        .flex-1 { flex: 1; }
        .btn-submit {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--mbank-green), var(--mbank-dark-green));
            color: white; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px;
            box-shadow: 0 4px 12px rgba(36, 200, 81, 0.2); transition: all 0.2s ease;
        }
        .btn-submit:disabled { background: #d1d1d6 !important; color: #8e8e93; cursor: not-allowed; box-shadow: none; }
        .card-type-badge { position: absolute; right: 14px; top: 38px; font-size: 12px; font-weight: bold; }
        .status-text { font-size: 12px; margin-top: 4px; display: block; }
        
        /* Стили всплывающего окна (Модалки) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--tg-theme-secondary-bg-color, #ffffff); padding: 24px; border-radius: 16px; width: 280px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .modal-btn { margin-top: 16px; padding: 10px 20px; background: var(--mbank-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2>MBANK Валидатор 🚀</h2>
        <p>Полностью автономная проверка карт</p>
    </div>
    
    <div class="input-group">
        <label for="card_number">Номер карты</label>
        <input type="text" id="card_number" inputmode="numeric" placeholder="4314 2511 ...." maxlength="22">
        <span id="card_type_text" class="card-type-badge"></span>
        <span id="validation_status" class="status-text"></span>
    </div>

    <div class="card-row">
        <div class="input-group flex-1">
            <label for="card_date">Срок действия</label>
            <input type="text" id="card_date" inputmode="numeric" placeholder="ММ/ГГ" maxlength="5">
        </div>
        <div class="input-group flex-1" id="cvv_block">
            <label for="card_cvv">CVV/CVC</label>
            <input type="password" id="card_cvv" inputmode="numeric" placeholder="***" maxlength="3">
        </div>
    </div>

    <button class="btn-submit" id="submit_btn" onclick="showLocalResult()" disabled>Введите данные 🔒</button>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--mbank-green); margin-top: 0;">🎉 Проверка успешна!</h3>
        <p id="modal_text" style="font-size: 14px; line-height: 1.4; text-align: left;"></p>
        <button class="modal-btn" onclick="closeModal()">Отлично</button>
    </div>
</div>

<script>
    // Инициализация WebApp Телеграма
    const tg = window.Telegram.WebApp;
    tg.expand(); 
    tg.ready();

    const cardInput = document.getElementById('card_number');
    const dateInput = document.getElementById('card_date');
    const cvvBlock = document.getElementById('cvv_block');
    const cvvInput = document.getElementById('card_cvv');
    const typeBadge = document.getElementById('card_type_text');
    const statusText = document.getElementById('validation_status');
    const submitBtn = document.getElementById('submit_btn');
    const modal = document.getElementById('resultModal');
    const modalText = document.getElementById('modal_text');

    let detectedType = "Неизвестно";
    let isAllowedSystem = false;

    // Математическая проверка по алгоритму Луна
    function validateLuhn(cardNumber) {
        let num = cardNumber.replace(/\s+/g, '');
        if (!/^\d{16,19}$/.test(num)) return false;
        let sum = 0;
        for (let i = 0; i < num.length; i++) {
            let intVal = parseInt(num.substr(i, 1));
            if (i % 2 === (num.length % 2 === 0 ? 0 : 1)) {
                intVal *= 2; if (intVal > 9) intVal -= 9;
            }
            sum += intVal;
        }
        return (sum % 10 === 0);
    }

    // Проверка заполненности всех полей формы для активации главной кнопки
    function checkFormValidity() {
        let rawCard = cardInput.value.replace(/\s+/g, '');
        let isLuhnValid = validateLuhn(rawCard);
        let isDateValid = /^(0[1-9]|1[0-2])\/([0-9]{2})$/.test(dateInput.value);
        let isCvvValid = rawCard.startsWith('9417') ? true : /^\d{3}$/.test(cvvInput.value);

        if (isAllowedSystem && isLuhnValid && isDateValid && isCvvValid) {
            submitBtn.disabled = false;
            submitBtn.innerText = "Проверить карту 🚀";
        } else {
            submitBtn.disabled = true;
            submitBtn.innerText = "Карта невалидна 🔒";
        }
    }

    // Логика отслеживания ввода номера карты
    cardInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');

        // 1. Фильтрация платежных систем по первым цифрам
        if (value.startsWith('9417')) {
            detectedType = 'ЭЛКАРТ 🇰🇬'; 
            isAllowedSystem = true;
            statusText.innerText = '';
            cvvBlock.style.display = 'none'; // Элкарт не требует ввода CVV
            cvvInput.value = '';
        } 
        else if (value.startsWith('4')) {
            detectedType = 'VISA 💳'; 
            isAllowedSystem = true;
            statusText.innerText = '';
            cvvBlock.style.display = 'block'; // Показываем CVV для Visa
        } 
        else {
            // Отсекаем двойки, пятерки и все остальные левые карты
            detectedType = 'Не поддерживается ❌'; 
            isAllowedSystem = false;
            statusText.innerText = '🔴 Карты этой системы не поддерживаются в MBANK!'; 
            statusText.style.color = 'var(--error-red)';
            cvvBlock.style.display = 'block';
        }

        // Вывод текста платежной системы
        if (value.length > 0) {
            typeBadge.innerText = detectedType; 
            typeBadge.style.color = isAllowedSystem ? (value.startsWith('9417') ? '#24c851' : '#004194') : 'var(--error-red)';
        } else {
            typeBadge.innerText = '';
            statusText.innerText = '';
        }

        // 2. Визуальная подсветка правильности алгоритма Луна
        if (isAllowedSystem && value.length >= 16) {
            if (validateLuhn(value)) {
                cardInput.className = 'valid';
                statusText.innerText = '🟢 Карта математически существует!'; 
                statusText.style.color = 'var(--mbank-green)';
            } else {
                cardInput.className = 'invalid';
                statusText.innerText = '🔴 Ошибка: Несуществующий номер (Луна)'; 
                statusText.style.color = 'var(--error-red)';
            }
        } else if (!isAllowedSystem && value.length > 0) {
            cardInput.className = 'invalid';
        } else {
            cardInput.className = '';
        }

        // Форматирование пробелов (каждые 4 цифры)
        let matches = value.match(/\d{1,4}/g);
        e.target.value = matches ? matches.join(' ') : value;
        checkFormValidity();
    });

    // Форматирование даты ММ/ГГ
    dateInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\//g, '').replace(/[^0-9]/gi, '');
        if (value.length > 2) e.target.value = value.substring(0, 2) + '/' + value.substring(2, 4);
        
        if (e.target.value.length === 5) {
            if (/^(0[1-9]|1[0-2])\/([0-9]{2})$/.test(e.target.value)) dateInput.className = 'valid';
            else dateInput.className = 'invalid';
        } else { dateInput.className = ''; }
        checkFormValidity();
    });

    // Валидация поля CVV
    cvvInput.addEventListener('input', () => {
        if (cvvInput.value.length === 3) cvvInput.className = 'valid';
        else cvvInput.className = '';
        checkFormValidity();
    });

    // Вывод всплывающего окна на экран (Без использования Python-сервера)
    function showLocalResult() {
        let rawCard = cardInput.value;
        modalText.innerHTML = `
            🏛️ Банк: <b>ОАО «МБанк»</b><br>
            🌐 Система: <b>${detectedType}</b><br>
            🔢 Номер: <code>${rawCard.substring(0, 9)}...</code><br>
            📅 Срок действия: <b>${dateInput.value}</b><br><br>
            🟢 <b>ВЕРДИКТ: КАРТА СУЩЕСТВУЕТ!</b>
        `;
        modal.style.display = 'flex';
    }

    // Закрытие приложения
    function closeModal() {
        modal.style.display = 'none';
        tg.close(); // Нативно закрывает шторку Mini App в Телеграме
    }
</script>
</body>
</html>
